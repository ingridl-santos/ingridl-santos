name: Roadmap Card

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  roadmap-card:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download roadmap.sh card
        run: |
          curl -L "https://roadmap.sh/card/tall/649c9727d99c9d67319df6e4?variant=dark" -o roadmap-card.png

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add roadmap-card.png
          git diff --staged --quiet || git commit -m "chore: update roadmap.sh card"
          git push
